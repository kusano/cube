    <script>
for (const canvas of document.querySelectorAll(".cube")) {
    const F = Array(12);
    for (let y=0; y<12; y++) {
        F[y] = Array(3);
        for (let x=0; x<3; x++) {
            F[y][x] = ".";
        }
    }

    const faces = canvas.dataset.faces.split("/").map(x=>x.split("-"));
    for (let y=0; y<4; y++) {
        for (let x=0; x<3; x++) {
            if (y%2==0) {
                F[(y*3+6)%12][x] = faces[y][x][0];
                F[(y*3+5)%12][x] = faces[y][x][1];
            } else {
                F[(y*3+5)%12][2-x] = faces[y][x][0];
                F[(y*3+6)%12][2-x] = faces[y][x][1];
            }
        }
    }

    const S = 16;

    const ctx = canvas.getContext("2d");
    const dpr = window.devicePixelRatio;
    canvas.width = S*5*dpr;
    canvas.height = S*14.5*dpr;
    ctx.scale(dpr, dpr);
    canvas.style.width = `${S*5}px`;
    canvas.style.height = `${S*14.5}px`;

    for (let f=0; f<4; f++) {
        for (let y=0; y<3; y++) {
            for (let x=0; x<3; x++) {
                ctx.beginPath();
                ctx.rect((x+1)*S, (f*3.5+y+.5)*S, S, S);
                ctx.fillStyle = {
                    "F": "#4f4",
                    "B": "#44f",
                    "U": "#fff",
                    "D": "#ee2",
                    ".": "#ccc",
                }[F[f*3+y][x]];
                ctx.fill();
                ctx.lineWidth = .5;
                ctx.stroke();
            }
        }
    }
}
    </script>
